services:
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    restart: unless-stopped
    ports:
      - "443:443"
    working_dir: /run/telemt
    command: ["/etc/telemt/config.toml"]
    volumes:
      - ./telemt-config:/etc/telemt:rw
    tmpfs:
      - /run/telemt:rw,mode=1777,size=4m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    security_opt:
      - no-new-privileges:true

  telemt-ui:
    build: .
    image: ghcr.io/truedru/telemt-ui:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - TELEMT_API_URL=http://telemt:9091
      # - TELEMT_AUTH_HEADER=Bearer change-me  # match auth_header in telemt-config/config.toml
      - TELEMT_UI_CONFIG=/app/data/settings.json
    volumes:
      - ./data:/app/data
    depends_on:
      - telemt
