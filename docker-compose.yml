  #     - ./telemt-config:/etc/telemt
  #   # ./telemt-config/config.toml needs [server.api] enabled = true,
  #   # auth_header = "Bearer <token>" (matching TELEMT_<ID>_AUTH_HEADER
  #   # in .env), and a whitelist covering this compose network.
