<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Telemt · Admin Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --accent: #3b82f6;
  --accent-h: #2563eb;
  --accent-soft: rgba(59,130,246,0.14);
  --accent-ring: rgba(59,130,246,0.35);
  --radius: 9px;
  --radius-sm: 6px;
  --sidebar-w: 244px;
  --row-h: 44px;
  --font: "Inter", system-ui, -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}
/* ---------- DARK (default) ---------- */
[data-theme="dark"] {
  --bg: #0a0a0b;
  --bg-2: #0e0e10;
  --panel: #141417;
  --panel-2: #18181b;
  --elev: #1c1c20;
  --hover: rgba(255,255,255,0.035);
  --hover-2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.13);
  --text: #ededef;
  --text-2: #a1a1aa;
  --muted: #71717a;
  --faint: #52525b;
  --ok: #34d399;
  --ok-soft: rgba(52,211,153,0.14);
  --warn: #fbbf24;
  --warn-soft: rgba(251,191,36,0.14);
  --err: #f87171;
  --err-soft: rgba(248,113,113,0.14);
  --bar-track: rgba(255,255,255,0.08);
  --qr-bg: #f5f5f6;
  --qr-fg: #0a0a0b;
  --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.45);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  color-scheme: dark;
}
/* ---------- LIGHT ---------- */
[data-theme="light"] {
  --bg: #f7f7f8;
  --bg-2: #f1f1f3;
  --panel: #ffffff;
  --panel-2: #fbfbfc;
  --elev: #ffffff;
  --hover: rgba(0,0,0,0.025);
  --hover-2: rgba(0,0,0,0.045);
  --border: rgba(0,0,0,0.09);
  --border-2: rgba(0,0,0,0.14);
  --text: #18181b;
  --text-2: #52525b;
  --muted: #71717a;
  --faint: #a1a1aa;
  --ok: #059669;
  --ok-soft: rgba(5,150,105,0.12);
  --warn: #d97706;
  --warn-soft: rgba(217,119,6,0.13);
  --err: #dc2626;
  --err-soft: rgba(220,38,38,0.10);
  --bar-track: rgba(0,0,0,0.08);
  --qr-bg: #0a0a0b;
  --qr-fg: #f5f5f6;
  --shadow: 0 1px 2px rgba(0,0,0,0.06), 0 12px 28px rgba(0,0,0,0.10);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  color-scheme: light;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "cv03","cv04","ss01";
}
.mono { font-family: var(--mono); font-feature-settings: "zero" 1; letter-spacing: -0.01em; }
::selection { background: var(--accent-soft); }
button { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent-ring); outline-offset: 1px; border-radius: 4px; }
.tnum { font-variant-numeric: tabular-nums; }

/* scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: padding-box; }

/* ============ APP SHELL ============ */
.app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; overflow: hidden; }
.app.collapsed { grid-template-columns: 60px 1fr; }

/* sidebar */
.sidebar { background: var(--bg-2); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.brand { display: flex; align-items: center; gap: 10px; padding: 16px 16px 12px; }
.brand-logo { width: 26px; height: 26px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent-h)); display: grid; place-items: center; color: #fff; flex-shrink: 0; box-shadow: 0 2px 8px var(--accent-soft); }
.brand-name { font-weight: 600; font-size: 14px; letter-spacing: -0.02em; }
.brand-name b { font-weight: 700; }
.app.collapsed .brand-name, .app.collapsed .switcher, .app.collapsed .nav-label, .app.collapsed .nav-section-t, .app.collapsed .side-foot-txt { display: none; }
.app.collapsed .nav-item { justify-content: center; padding: 0; }
.app.collapsed .brand { justify-content: center; padding: 16px 0 12px; }

/* instance switcher */
.switcher-wrap { padding: 4px 12px 10px; }
.switcher { width: 100%; display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text); transition: border-color .12s, background .12s; }
.switcher:hover { border-color: var(--border-2); background: var(--panel-2); }
.switcher-ic { width: 22px; height: 22px; border-radius: 5px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
.switcher-meta { text-align: left; min-width: 0; flex: 1; }
.switcher-name { font-weight: 550; font-size: 12.5px; display: flex; align-items: center; gap: 6px; }
.switcher-region { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.switcher-caret { color: var(--muted); }

/* node dropdown */
.node-pop { position: absolute; top: 100%; left: 12px; right: 12px; margin-top: 6px; background: var(--elev); border: 1px solid var(--border-2); border-radius: var(--radius); box-shadow: var(--shadow); padding: 5px; z-index: 40; }
.node-opt { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: var(--radius-sm); cursor: pointer; }
.node-opt:hover { background: var(--hover-2); }
.node-opt.active { background: var(--accent-soft); }
.node-opt-meta { flex: 1; min-width: 0; }
.node-opt-name { font-weight: 550; font-size: 12.5px; display: flex; align-items: center; gap: 7px; }
.node-opt-sub { color: var(--muted); font-size: 11px; }
.node-opt-stat { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
.node-pop-foot { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }

/* nav */
.nav { flex: 1; overflow-y: auto; padding: 6px 12px; min-height: 0; }
.nav-section-t { font-size: 10.5px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); padding: 14px 10px 5px; }
.nav-item { display: flex; align-items: center; gap: 10px; height: 34px; padding: 0 10px; border-radius: var(--radius-sm); color: var(--text-2); cursor: pointer; font-weight: 500; font-size: 13px; position: relative; transition: background .1s, color .1s; user-select: none; }
.nav-item:hover { background: var(--hover); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--text); }
.nav-item.active::before { content: ""; position: absolute; left: -12px; top: 7px; bottom: 7px; width: 3px; border-radius: 0 3px 3px 0; background: var(--accent); }
.nav-ic { display: grid; place-items: center; color: inherit; opacity: .85; }
.nav-item.active .nav-ic { opacity: 1; color: var(--accent); }
.nav-label { flex: 1; }
.nav-dot { margin-left: auto; }
.nav-badge { font-size: 10.5px; font-weight: 600; color: var(--muted); background: var(--hover-2); padding: 1px 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
[data-dots="off"] .nav-dot { display: none; }

.side-foot { border-top: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 9px; color: var(--muted); font-size: 11.5px; }
.side-foot-txt { line-height: 1.3; }
.side-foot-txt b { color: var(--text-2); font-weight: 600; }

/* main column */
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg); }
.topbar { height: 54px; flex-shrink: 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 22px; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 20; }
.topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.topbar-sub { color: var(--muted); font-size: 12px; }
.crumb { display: flex; align-items: center; gap: 8px; }
.crumb-sep { color: var(--faint); }
.topbar-spacer { flex: 1; }
.topbar-search { display: flex; align-items: center; gap: 8px; height: 32px; padding: 0 11px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); width: 210px; cursor: text; }
.topbar-search input { border: none; background: transparent; color: var(--text); outline: none; font-size: 12.5px; width: 100%; font-family: inherit; }
.topbar-search kbd { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }

.content { flex: 1; overflow-y: auto; min-height: 0; }
.content-inner { padding: 24px; max-width: 1320px; margin: 0 auto; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.025em; margin: 0; }
.page-desc { color: var(--muted); font-size: 13px; margin-top: 3px; }
.page-actions { display: flex; gap: 9px; align-items: center; }

/* ============ CARD ============ */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.card-pad { padding: 16px; }
.card-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
.card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
.card-sub { color: var(--muted); font-size: 11.5px; }

/* stat card */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(212px, 1fr)); gap: 14px; }
.stat { position: relative; overflow: hidden; }
.stat-label { color: var(--muted); font-size: 11.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-size: 27px; font-weight: 600; letter-spacing: -0.03em; margin-top: 8px; line-height: 1; display: flex; align-items: baseline; gap: 7px; }
.stat-value .unit { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: 0; }
.stat-foot { margin-top: 11px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.stat-delta { font-size: 11.5px; font-weight: 550; display: inline-flex; align-items: center; gap: 2px; font-variant-numeric: tabular-nums; }
.stat-delta.up { color: var(--ok); }
.stat-delta.down { color: var(--err); }
.stat-spark { position: absolute; right: 14px; bottom: 12px; opacity: .9; }

/* ============ BADGE ============ */
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 550; padding: 2.5px 8px; border-radius: 999px; border: 1px solid transparent; white-space: nowrap; line-height: 1.3; }
.badge-sm { font-size: 10.5px; padding: 1.5px 7px; }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.badge-neutral { background: var(--hover-2); color: var(--text-2); border-color: var(--border); }
.badge-ok { background: var(--ok-soft); color: var(--ok); }
.badge-warn { background: var(--warn-soft); color: var(--warn); }
.badge-err { background: var(--err-soft); color: var(--err); }
.badge-accent { background: var(--accent-soft); color: var(--accent); }
.badge-outline { border-color: var(--border-2); color: var(--text-2); }

/* ============ DOT ============ */
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-pulse { box-shadow: 0 0 0 0 var(--dot-c); animation: pulse 2.4s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--dot-c) 55%, transparent); } 70% { box-shadow: 0 0 0 5px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }

/* ============ BUTTON ============ */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-weight: 550; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; white-space: nowrap; transition: background .12s, border-color .12s, color .12s, opacity .12s; line-height: 1; }
.btn-md { height: 32px; padding: 0 13px; font-size: 12.5px; }
.btn-sm { height: 27px; padding: 0 9px; font-size: 12px; }
.btn-lg { height: 38px; padding: 0 16px; font-size: 13.5px; }
.btn-full { width: 100%; }
.btn-ic { display: grid; place-items: center; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
.btn-primary:hover { background: var(--accent-h); }
.btn-default { background: var(--panel); border-color: var(--border-2); color: var(--text); }
.btn-default:hover { background: var(--hover-2); border-color: var(--muted); }
.btn-ghost { background: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--hover-2); color: var(--text); }
.btn-danger { background: var(--err-soft); color: var(--err); border-color: transparent; }
.btn-danger:hover { background: var(--err); color: #fff; }
.btn-dangerSolid { background: var(--err); color: #fff; }
.btn-dangerSolid:hover { filter: brightness(1.08); }
.btn:disabled { opacity: .45; cursor: not-allowed; }

.icon-btn { width: 30px; height: 30px; display: grid; place-items: center; border-radius: var(--radius-sm); border: 1px solid transparent; background: transparent; color: var(--text-2); cursor: pointer; transition: background .1s, color .1s; }
.icon-btn:hover { background: var(--hover-2); color: var(--text); }
.icon-btn.is-active { background: var(--accent-soft); color: var(--accent); }
.icon-btn.is-danger:hover { background: var(--err-soft); color: var(--err); }

/* ============ TOGGLE ============ */
.toggle { --tw: 34px; --th: 19px; width: var(--tw); height: var(--th); border-radius: 999px; background: var(--border-2); border: none; padding: 0; cursor: pointer; position: relative; transition: background .16s; flex-shrink: 0; }
.toggle-sm { --tw: 28px; --th: 16px; }
.toggle.on { background: var(--accent); }
.toggle-knob { position: absolute; top: 2px; left: 2px; width: calc(var(--th) - 4px); height: calc(var(--th) - 4px); border-radius: 50%; background: #fff; transition: transform .16s cubic-bezier(.4,0,.2,1); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
.toggle.on .toggle-knob { transform: translateX(calc(var(--tw) - var(--th))); }
.toggle.disabled { opacity: .5; cursor: not-allowed; }

/* ============ TABLE ============ */
.tbl-wrap { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.tbl thead th { text-align: left; font-weight: 550; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 0 12px 9px; border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none; }
.tbl thead th.sortable { cursor: pointer; }
.tbl thead th.sortable:hover { color: var(--text-2); }
.tbl th.num, .tbl td.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl tbody td { padding: 0 12px; height: var(--row-h); border-bottom: 1px solid var(--border); vertical-align: middle; }
.tbl tbody tr { transition: background .08s; }
.tbl tbody tr.clickable { cursor: pointer; }
.tbl tbody tr.clickable:hover { background: var(--hover); }
.tbl tbody tr:last-child td { border-bottom: none; }
.sort-ic { display: inline-flex; vertical-align: middle; margin-left: 3px; opacity: .8; }
.dense .tbl tbody td { height: 36px; }
.dense .stat-value { font-size: 24px; }

.u-name { display: flex; align-items: center; gap: 9px; font-weight: 550; }
.u-av { width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; font-size: 10.5px; font-weight: 600; color: var(--text); background: var(--hover-2); border: 1px solid var(--border); text-transform: uppercase; flex-shrink: 0; }
.muted { color: var(--muted); }
.faint { color: var(--faint); }
.nowrap { white-space: nowrap; }

/* progress / quota */
.bar { width: 100%; border-radius: 999px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 999px; transition: width .3s; }
.bar-label { position: absolute; inset: 0; display: grid; place-items: center; font-size: 10px; }
.quota-cell { display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
.quota-meta { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }

/* ============ GATES ============ */
.gates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 9px; }
.gate { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--panel-2); transition: border-color .12s; }
.gate:hover { border-color: var(--border-2); }
.gate-body { min-width: 0; flex: 1; }
.gate-label { font-weight: 550; font-size: 12.5px; }
.gate-desc { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============ EVENTS ============ */
.events { display: flex; flex-direction: column; }
.event-row { display: flex; align-items: center; gap: 11px; padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.event-row:last-child { border-bottom: none; }
.event-sev { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.event-type { font-weight: 550; }
.event-detail { color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-time { color: var(--faint); font-size: 11px; font-variant-numeric: tabular-nums; white-space: nowrap; }

/* ============ DRAWER / MODAL ============ */
.drawer-root { position: fixed; inset: 0; z-index: 60; pointer-events: none; }
.drawer-root.open { pointer-events: auto; }
.scrim { position: absolute; inset: 0; background: rgba(0,0,0,0.45); opacity: 0; transition: opacity .2s; }
.drawer-root.open .scrim, .modal-root .scrim { opacity: 1; }
.drawer { position: absolute; top: 0; right: 0; bottom: 0; max-width: 92vw; background: var(--panel); border-left: 1px solid var(--border-2); box-shadow: var(--shadow); transform: translateX(100%); transition: transform .26s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
.drawer-root.open .drawer { transform: translateX(0); }
.drawer-head { display: flex; align-items: flex-start; gap: 12px; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.drawer-body { flex: 1; overflow-y: auto; padding: 18px 20px 28px; }
.drawer-foot { border-top: 1px solid var(--border); padding: 13px 20px; display: flex; gap: 9px; justify-content: flex-end; background: var(--panel-2); }

.modal-root { position: fixed; inset: 0; z-index: 70; display: grid; place-items: center; padding: 24px; }
.modal { position: relative; background: var(--panel); border: 1px solid var(--border-2); border-radius: 13px; box-shadow: var(--shadow); max-width: 94vw; max-height: 90vh; display: flex; flex-direction: column; animation: pop .18s cubic-bezier(.34,1.3,.64,1); }
@keyframes pop { from { transform: scale(.97) translateY(6px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { padding: 18px 20px 6px; }
.modal-title { font-size: 15.5px; font-weight: 600; letter-spacing: -0.02em; }
.modal-desc { color: var(--muted); font-size: 12.5px; margin-top: 3px; }
.modal-body { padding: 16px 20px; overflow-y: auto; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 9px; justify-content: flex-end; }

/* ============ MENU ============ */
.menu-wrap { position: relative; display: inline-flex; }
.menu { position: absolute; top: calc(100% + 5px); min-width: 184px; background: var(--elev); border: 1px solid var(--border-2); border-radius: var(--radius); box-shadow: var(--shadow); padding: 5px; z-index: 50; animation: pop .12s ease; }
.menu-right { right: 0; }
.menu-left { left: 0; }
.menu-item { display: flex; align-items: center; gap: 9px; width: 100%; padding: 7px 9px; border-radius: var(--radius-sm); background: transparent; border: none; color: var(--text-2); font-size: 12.5px; font-weight: 500; cursor: pointer; text-align: left; }
.menu-item:hover { background: var(--hover-2); color: var(--text); }
.menu-item.danger { color: var(--err); }
.menu-item.danger:hover { background: var(--err-soft); }
.menu-ic { display: grid; place-items: center; opacity: .85; }
.menu-sep { height: 1px; background: var(--border); margin: 4px 2px; }

/* ============ FIELDS ============ */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12px; font-weight: 550; color: var(--text-2); display: flex; align-items: center; gap: 8px; }
.field-restart { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: var(--warn); background: var(--warn-soft); padding: 1px 6px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em; }
.field-dirty { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: auto; }
.field-hint { font-size: 11px; color: var(--muted); }
.input { height: 32px; padding: 0 11px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--text); font-size: 12.5px; font-family: inherit; width: 100%; transition: border-color .12s, box-shadow .12s; }
[data-theme="light"] .input { background: var(--panel); }
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.input::placeholder { color: var(--faint); }
textarea.input { height: auto; padding: 9px 11px; resize: vertical; line-height: 1.5; }
.num-wrap, .select-wrap { position: relative; display: flex; align-items: center; }
.num-unit { position: absolute; right: 11px; color: var(--muted); font-size: 11.5px; pointer-events: none; }
.select { appearance: none; padding-right: 30px; cursor: pointer; }
.select-caret { position: absolute; right: 9px; color: var(--muted); pointer-events: none; }

.arr-editor { display: flex; flex-direction: column; gap: 8px; }
.arr-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.arr-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; padding: 3px 4px 3px 9px; background: var(--hover-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.arr-chip button { display: grid; place-items: center; width: 16px; height: 16px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 4px; }
.arr-chip button:hover { background: var(--err-soft); color: var(--err); }
.arr-empty { color: var(--faint); font-size: 11.5px; font-style: italic; }
.arr-add { display: flex; gap: 7px; }

/* copy button */
.copy-btn { display: inline-flex; align-items: center; gap: 9px; justify-content: space-between; padding: 7px 9px 7px 11px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; font-size: 12px; transition: border-color .12s, background .12s; max-width: 100%; }
[data-theme="light"] .copy-btn { background: var(--panel-2); }
.copy-btn:hover { border-color: var(--muted); background: var(--hover); }
.copy-full { width: 100%; }
.copy-val { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-ic { color: var(--muted); display: grid; place-items: center; flex-shrink: 0; }

/* tabs */
.tabs { display: inline-flex; gap: 2px; padding: 3px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; }
[data-theme="light"] .tabs { background: var(--bg-2); }
.tab { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 6px; border: none; background: transparent; color: var(--text-2); font-size: 12.5px; font-weight: 500; cursor: pointer; transition: background .12s, color .12s; }
.tab:hover { color: var(--text); }
.tab.active { background: var(--panel); color: var(--text); box-shadow: var(--shadow-sm); }
[data-theme="dark"] .tab.active { background: var(--elev); }
.tab-ic { display: grid; place-items: center; opacity: .85; }
.tab-count { font-size: 10.5px; background: var(--hover-2); color: var(--muted); padding: 0 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
.tab.active .tab-count { background: var(--accent-soft); color: var(--accent); }
.tabs-sm .tab { padding: 5px 10px; font-size: 12px; }

/* empty state */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 38px 24px; gap: 9px; }
.empty-ic { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; background: var(--hover); color: var(--muted); border: 1px solid var(--border); }
.empty-title { font-weight: 600; font-size: 13.5px; }
.empty-desc { color: var(--muted); font-size: 12px; max-width: 300px; }

/* kv */
.kv { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.kv:last-child { border-bottom: none; }
.kv-k { color: var(--muted); white-space: nowrap; }
.kv-v { text-align: right; font-weight: 500; }

/* qr */
.qr { box-shadow: var(--shadow-sm); border-radius: 10px; }

/* layout helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; }
.row { display: flex; align-items: center; gap: 10px; }
.col { display: flex; flex-direction: column; }
.gap-sm { gap: 8px; } .gap-md { gap: 14px; } .gap-lg { gap: 20px; }
.mt-lg { margin-top: 20px; } .mt-md { margin-top: 14px; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); margin: 0 0 10px; }
@media (max-width: 1080px) { .grid-3 { grid-template-columns: 1fr; } }

/* save bar */
.savebar { position: fixed; left: var(--sidebar-w); right: 0; bottom: 0; padding: 13px 24px; background: color-mix(in srgb, var(--panel) 94%, transparent); backdrop-filter: blur(10px); border-top: 1px solid var(--border-2); display: flex; align-items: center; gap: 14px; z-index: 30; box-shadow: 0 -6px 24px rgba(0,0,0,0.22); animation: slideUp .22s cubic-bezier(.34,1.2,.64,1) both; }
.app.collapsed .savebar { left: 60px; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.savebar-diff { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; }
.diff-chip { font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 5px; background: var(--accent-soft); color: var(--accent); }

/* config accordion */
.cfg-section { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; background: var(--panel); }
.cfg-head { display: flex; align-items: center; gap: 11px; padding: 14px 16px; cursor: pointer; user-select: none; }
.cfg-head:hover { background: var(--hover); }
.cfg-chev { color: var(--muted); transition: transform .18s; }
.cfg-section.open .cfg-chev { transform: rotate(90deg); }
.cfg-title { font-weight: 600; font-size: 13.5px; }
.cfg-meta { margin-left: auto; display: flex; align-items: center; gap: 9px; }
.cfg-body { padding: 4px 16px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px 22px; }
.cfg-body.cols-1 { grid-template-columns: 1fr; }
.cfg-field-wide { grid-column: 1 / -1; }
.cfg-inline { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
.cfg-inline-meta { min-width: 0; }
.cfg-inline-label { font-size: 12.5px; font-weight: 550; }
.cfg-inline-desc { font-size: 11px; color: var(--muted); }
@media (max-width: 720px) { .cfg-body { grid-template-columns: 1fr; } }

/* timeline */
.timeline { position: relative; padding-left: 20px; }
.timeline::before { content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1.5px; background: var(--border-2); }
.tl-item { position: relative; padding: 0 0 14px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-node { position: absolute; left: -19px; top: 2px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--bg); }
.tl-meta { display: flex; align-items: center; gap: 9px; }
.tl-gen { font-weight: 600; font-size: 12.5px; }
.tl-time { color: var(--muted); font-size: 11px; white-space: nowrap; }

/* coverage mini bar in table */
.cov-cell { display: flex; align-items: center; gap: 9px; min-width: 120px; }
.cov-bar { flex: 1; }
.cov-val { font-variant-numeric: tabular-nums; font-size: 12px; width: 36px; text-align: right; }

/* floor pips */
.floor { display: inline-flex; gap: 6px; font-variant-numeric: tabular-nums; font-size: 11.5px; }
.floor span { color: var(--muted); }
.floor b { color: var(--text); font-weight: 600; }

.fp-hash { font-family: var(--mono); font-size: 11.5px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ratio-cell { display: flex; align-items: center; gap: 8px; }
.ratio-bar { width: 54px; height: 5px; }

.toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { display: flex; align-items: center; gap: 9px; padding: 10px 15px; background: var(--elev); border: 1px solid var(--border-2); border-radius: 999px; box-shadow: var(--shadow); font-size: 12.5px; font-weight: 500; animation: pop .18s ease; }
.toast .toast-ic { display: grid; place-items: center; color: var(--ok); }

.skel { background: linear-gradient(90deg, var(--hover) 25%, var(--hover-2) 37%, var(--hover) 63%); background-size: 400% 100%; animation: shimmer 1.4s infinite; border-radius: 5px; }
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

#root { height: 100vh; }
</style>
</head>
