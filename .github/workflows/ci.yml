name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      APP_PASSWORD: ci-placeholder-password
      TELEMT_CI_BASE_URL: http://127.0.0.1:9090
      TELEMT_CI_AUTH_HEADER: "Bearer ci-placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
